name: CI/CD — UM Tech ServiceLayer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: um-tech-servicelayer

jobs:
  # ────────────────────────────────────────────
  # JOB 1 — Lint & Test
  # ────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx aiosqlite

      - name: Lint with Ruff
        run: ruff check app/ tests/ --output-format=github

      - name: Run tests (SQLite, no PostgreSQL needed)
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-for-production

  # ────────────────────────────────────────────
  # JOB 2 — Build & Push Docker image
  # Runs only on push to main (not PRs)
  # ────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  # JOB 3 — Deploy to Render
  # Triggers Render deploy hook after image is built
  # ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            --url "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          | grep -qE "^2" && echo "✅ Deploy triggered successfully" \
          || (echo "❌ Deploy trigger failed" && exit 1)

      - name: Wait for deploy to go live
        run: |
          echo "Waiting 60s for Render to spin up..."
          sleep 60

      - name: Health check — confirm API is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ secrets.RENDER_API_URL }}/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ API is live and healthy (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi